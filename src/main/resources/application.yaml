spring:
  application:
    name: notification

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  mail:
    host: smtp.gmail.com
    port: 587
    username: your@gmail.com
    password: app-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true